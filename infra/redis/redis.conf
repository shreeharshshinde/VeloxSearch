# =============================================================================
# Redis Configuration — Real-Time Indexing System
# PRN: 22510103
#
# Used by redis-stack (includes RedisBloom module for Bloom filter).
# Mounted into container at /redis-stack.conf
# =============================================================================

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no                  # allow connections from Docker network

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 1gb
maxmemory-policy allkeys-lru       # evict least-recently-used keys when full
                                   # IMPORTANT: Bloom filter key must survive —
                                   # in production, set noeviction and scale RAM

# ── Persistence ───────────────────────────────────────────────────────────────
# RDB snapshot (point-in-time backup)
save 900 1                         # save if 1 key changed in 900s
save 300 10                        # save if 10 keys changed in 300s
save 60 10000                      # save if 10000 keys changed in 60s

# AOF (append-only log — more durable, slightly slower)
appendonly yes
appendfsync everysec               # fsync every second (balance of speed/safety)
no-appendfsync-on-rewrite no

# ── Performance ───────────────────────────────────────────────────────────────
tcp-backlog 511
tcp-keepalive 300
hz 10                              # background task frequency

# Sorted set optimisations (our URL priority queue)
zset-max-listpack-entries 128
zset-max-listpack-value 64

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""                         # stdout (Docker captures it)

# ── Streams (for crawl-complete events) ──────────────────────────────────────
stream-node-max-bytes 4096
stream-node-max-entries 100

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000      # log commands slower than 10ms
slowlog-max-len 128